name: Claude Review
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      github.event_name == 'issues'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        shell: bash
        run: |
          if [ -d ".git" ]; then
            git fetch origin "${{ github.sha }}" --depth=1
            git checkout "${{ github.sha }}"
          else
            git clone --depth=1 --branch "${{ github.ref_name }}" "${{ github.server_url }}/${{ github.repository }}.git" .
          fi
      - uses: markwylde/claude-code-gitea-action@v1.0.20
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gitea_token: ${{ secrets.GITEA_TOKEN }}
          claude_git_name: claude-review
          claude_git_email: claude@anthropic.com
          timeout_minutes: 10
