name: Claude Plan Breakdown
on:
  issues:
    types: [labeled]

jobs:
  breakdown:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Analyze and post breakdown
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_FULL: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python3 << 'PYSCRIPT'
          import json, os, subprocess, tempfile

          API_KEY = os.environ["ANTHROPIC_API_KEY"]
          GITEA_TOKEN = os.environ["GITEA_TOKEN"]
          ISSUE_NUM = os.environ["ISSUE_NUMBER"]
          REPO = os.environ["REPO_FULL"]
          SERVER = os.environ["SERVER_URL"]
          GITEA_API = f"{SERVER}/api/v1"

          # Shell-level label guard: Gitea's github.event.label.name is always empty,
          # so we check via API whether the issue actually has 'needs-breakdown'
          issue_check = subprocess.run(
              ["curl", "-sf", "-H", f"Authorization: token {GITEA_TOKEN}",
               f"{GITEA_API}/repos/{REPO}/issues/{ISSUE_NUM}"],
              capture_output=True, text=True)
          if issue_check.stdout:
              issue_data = json.loads(issue_check.stdout)
              label_names = [l["name"] for l in issue_data.get("labels", [])]
              if "needs-breakdown" not in label_names:
                  print(f"Issue #{ISSUE_NUM} does not have 'needs-breakdown' label, skipping")
                  import sys; sys.exit(0)
          else:
              print("Could not fetch issue, skipping")
              import sys; sys.exit(0)

          def api_call(method, url, data=None, headers=None):
              """Make API call via curl to avoid SSL issues."""
              cmd = ["curl", "-sf"]
              for k, v in (headers or {}).items():
                  cmd.extend(["-H", f"{k}: {v}"])
              if method != "GET":
                  cmd.extend(["-X", method])
              if data:
                  tf = tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False)
                  tf.write(data if isinstance(data, str) else json.dumps(data))
                  tf.close()
                  cmd.extend(["-H", "Content-Type: application/json", "-d", f"@{tf.name}"])
              cmd.append(url)
              r = subprocess.run(cmd, capture_output=True, text=True)
              if data:
                  os.unlink(tf.name)
              return json.loads(r.stdout) if r.stdout else None

          # Fetch issue
          issue = api_call("GET", f"{GITEA_API}/repos/{REPO}/issues/{ISSUE_NUM}",
                           headers={"Authorization": f"token {GITEA_TOKEN}"})
          title = issue["title"]
          body = issue.get("body", "No description") or "No description"
          labels = [l["name"] for l in issue.get("labels", [])]

          # Get repo tree
          tree_r = subprocess.run(
              ["find", ".", "-type", "f", "-not", "-path", "./.git/*",
               "-not", "-path", "./node_modules/*"],
              capture_output=True, text=True)
          tree = "
".join(sorted(tree_r.stdout.strip().split("
"))[:50])

          # Read CLAUDE.md
          claude_md = ""
          if os.path.exists("CLAUDE.md"):
              with open("CLAUDE.md") as f:
                  claude_md = f.read()[:3000]

          prompt = f"""You are analyzing a codebase issue. Produce a detailed implementation plan.

          Issue #{ISSUE_NUM}: {title}
          Labels: {", ".join(labels)}

          Issue body:
          {body}

          Repository structure (first 50 files):
          {tree}

          Project context (CLAUDE.md excerpt):
          {claude_md}

          Structure your response as:

          ## Implementation Plan for #{ISSUE_NUM}

          ### Steps
          - **Step N: [title]** (complexity: trivial/small/medium/large)
            - What to do, files affected, dependencies

          ### Acceptance Criteria
          - Testable criteria

          ### Questions / Ambiguities
          - Items needing clarification

          Be specific. Reference actual code and files."""

          # Call Anthropic API via curl
          result = api_call("POST", "https://api.anthropic.com/v1/messages",
              data={"model": "claude-sonnet-4-20250514", "max_tokens": 4096,
                    "messages": [{"role": "user", "content": prompt}]},
              headers={"x-api-key": API_KEY, "anthropic-version": "2023-06-01"})

          if result and result.get("content"):
              analysis = result["content"][0]["text"]
          elif result and result.get("error"):
              analysis = f"**Breakdown failed:** {result['error'].get('message', str(result['error']))}"
          else:
              analysis = "**Breakdown failed:** No response from API"

          # Post comment
          api_call("POST", f"{GITEA_API}/repos/{REPO}/issues/{ISSUE_NUM}/comments",
              data={"body": analysis},
              headers={"Authorization": f"token {GITEA_TOKEN}"})
          print(f"Posted breakdown for #{ISSUE_NUM}")
          PYSCRIPT
