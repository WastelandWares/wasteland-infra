name: Claude Plan Breakdown
on:
  issues:
    types: [labeled]

jobs:
  breakdown:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Get issue and analyze
        id: analyze
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          API_URL="${{ github.server_url }}/api/v1"

          # Fetch issue details
          ISSUE_DATA=$(curl -sf -H "Authorization: token $GITEA_TOKEN" \
            "$API_URL/repos/$REPO/issues/$ISSUE_NUMBER")
          TITLE=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          BODY=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','No description'))" 2>/dev/null || echo "No description")

          # Get repo structure for context
          TREE=$(find . -type f -not -path './.git/*' -not -path './node_modules/*' | sort | head -50)

          # Read CLAUDE.md if it exists
          CLAUDE_MD=""
          if [ -f "CLAUDE.md" ]; then
            CLAUDE_MD=$(cat CLAUDE.md | head -100)
          fi

          # Call Anthropic API directly
          PROMPT="You are analyzing a codebase issue. Produce a detailed implementation plan.

          Issue #${ISSUE_NUMBER}: ${TITLE}

          Issue body:
          ${BODY}

          Repository structure (first 50 files):
          ${TREE}

          Project context (CLAUDE.md):
          ${CLAUDE_MD}

          Structure your response as:

          ## Implementation Plan for #${ISSUE_NUMBER}

          ### Steps
          For each step:
          - **Step N: [title]** (complexity: trivial/small/medium/large)
            - What to do
            - Files affected
            - Dependencies

          ### Acceptance Criteria
          - Testable criteria

          ### Questions / Ambiguities
          - Items needing clarification

          Be specific. Reference actual code and files."

          # Use python to call the API (avoids shell escaping issues)
          python3 << PYEOF2
          import json, urllib.request, os

          prompt = json.loads(open("/dev/stdin").read() if False else '""')

          payload = {
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": """$PROMPT"""}]
          }

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=json.dumps(payload).encode(),
              headers={
                  "x-api-key": os.environ["ANTHROPIC_API_KEY"],
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          try:
              resp = urllib.request.urlopen(req, timeout=120)
              result = json.loads(resp.read())
              text = result["content"][0]["text"]
              with open("/tmp/breakdown-result.md", "w") as f:
                  f.write(text)
              print("Analysis complete")
          except Exception as e:
              print(f"API error: {e}")
              with open("/tmp/breakdown-result.md", "w") as f:
                  f.write(f"Breakdown analysis failed: {e}")
          PYEOF2

      - name: Post comment
        if: always()
        shell: bash
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          API_URL="${{ github.server_url }}/api/v1"

          if [ -f /tmp/breakdown-result.md ]; then
            python3 << PYEOF3
          import json, subprocess, tempfile, os

          with open("/tmp/breakdown-result.md") as f:
              body = f.read()

          payload = json.dumps({"body": body})
          with tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False) as f:
              f.write(payload)
              tmpfile = f.name

          subprocess.run([
              "curl", "-sf",
              "-H", "Authorization: token " + os.environ["GITEA_TOKEN"],
              "-X", "POST",
              "${API_URL}/repos/${REPO}/issues/${ISSUE_NUMBER}/comments",
              "-H", "Content-Type: application/json",
              "-d", "@" + tmpfile
          ])
          os.unlink(tmpfile)
          print("Comment posted")
          PYEOF3
          fi
