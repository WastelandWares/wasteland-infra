name: Claude Plan Breakdown
on:
  issues:
    types: [labeled]

jobs:
  breakdown:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Analyze and post breakdown
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_FULL: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          python3 << 'PYSCRIPT'
          import json, urllib.request, os, subprocess, tempfile

          API_KEY = os.environ["ANTHROPIC_API_KEY"]
          GITEA_TOKEN = os.environ["GITEA_TOKEN"]
          ISSUE_NUM = os.environ["ISSUE_NUMBER"]
          REPO = os.environ["REPO_FULL"]
          SERVER = os.environ["SERVER_URL"]
          GITEA_API = f"{SERVER}/api/v1"

          # Fetch issue
          req = urllib.request.Request(
              f"{GITEA_API}/repos/{REPO}/issues/{ISSUE_NUM}",
              headers={"Authorization": f"token {GITEA_TOKEN}"}
          )
          issue = json.loads(urllib.request.urlopen(req).read())
          title = issue["title"]
          body = issue.get("body", "No description") or "No description"
          labels = [l["name"] for l in issue.get("labels", [])]

          # Get repo tree
          tree_result = subprocess.run(
              ["find", ".", "-type", "f", "-not", "-path", "./.git/*",
               "-not", "-path", "./node_modules/*"],
              capture_output=True, text=True
          )
          tree = "\n".join(sorted(tree_result.stdout.strip().split("\n"))[:50])

          # Read CLAUDE.md
          claude_md = ""
          if os.path.exists("CLAUDE.md"):
              with open("CLAUDE.md") as f:
                  claude_md = f.read()[:3000]

          # Build prompt
          prompt = f"""You are analyzing a codebase issue. Produce a detailed implementation plan.

          Issue #{ISSUE_NUM}: {title}
          Labels: {', '.join(labels)}

          Issue body:
          {body}

          Repository structure (first 50 files):
          {tree}

          Project context (CLAUDE.md excerpt):
          {claude_md}

          Structure your response EXACTLY as:

          ## Implementation Plan for #{ISSUE_NUM}

          ### Steps
          For each step:
          - **Step N: [title]** (complexity: trivial/small/medium/large)
            - What to do
            - Files affected
            - Dependencies

          ### Acceptance Criteria
          - Testable criteria

          ### Questions / Ambiguities
          - Items needing clarification

          Be specific. Reference actual code and files. small = hours, medium = 1-2 days, large = 3+ days."""

          # Call Anthropic API
          payload = json.dumps({
              "model": "claude-sonnet-4-20250514",
              "max_tokens": 4096,
              "messages": [{"role": "user", "content": prompt}]
          })

          req = urllib.request.Request(
              "https://api.anthropic.com/v1/messages",
              data=payload.encode(),
              headers={
                  "x-api-key": API_KEY,
                  "anthropic-version": "2023-06-01",
                  "content-type": "application/json"
              }
          )

          try:
              resp = urllib.request.urlopen(req, timeout=120)
              result = json.loads(resp.read())
              analysis = result["content"][0]["text"]
          except Exception as e:
              analysis = f"**Breakdown analysis failed:** {e}"

          # Post as comment
          comment_payload = json.dumps({"body": analysis})
          with tempfile.NamedTemporaryFile(mode="w", suffix=".json", delete=False) as f:
              f.write(comment_payload)
              tmpfile = f.name

          subprocess.run([
              "curl", "-sf",
              "-H", f"Authorization: token {GITEA_TOKEN}",
              "-X", "POST",
              f"{GITEA_API}/repos/{REPO}/issues/{ISSUE_NUM}/comments",
              "-H", "Content-Type: application/json",
              "-d", f"@{tmpfile}"
          ], capture_output=True)
          os.unlink(tmpfile)
          print(f"Posted breakdown for #{ISSUE_NUM}")
          PYSCRIPT
