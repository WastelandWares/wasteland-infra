name: Claude Plan Breakdown
on:
  issues:
    types: [labeled]

jobs:
  breakdown:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Get issue details
        id: issue
        shell: bash
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          ISSUE_DATA=$(curl -sf -H "Authorization: token $GITEA_TOKEN"             "${{ github.server_url }}/api/v1/repos/$REPO/issues/$ISSUE_NUMBER")
          TITLE=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin)['title'])")
          BODY=$(echo "$ISSUE_DATA" | python3 -c "import sys,json; print(json.load(sys.stdin).get('body','No description'))")
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          {
            echo "body<<EOFBODY"
            echo "$BODY"
            echo "EOFBODY"
          } >> $GITHUB_OUTPUT

      - name: Run Claude breakdown
        shell: bash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print --dangerously-skip-permissions -m sonnet <<'PROMPT'
          You are analyzing issue #${{ steps.issue.outputs.number }}: ${{ steps.issue.outputs.title }}

          Issue body:
          ${{ steps.issue.outputs.body }}

          Read the codebase (CLAUDE.md, relevant source files) and produce a detailed
          implementation plan. Structure as:

          ## Implementation Plan

          ### Steps
          For each step:
          - **Step N: [title]** (complexity: trivial/small/medium/large)
            - What to do
            - Files affected
            - Dependencies

          ### Acceptance Criteria
          - Testable criteria

          ### Questions / Ambiguities
          - Unclear items needing clarification

          ### Suggested Sub-Issues
          - Sub-issues to create

          Be specific. Reference actual code and files. small = hours, medium = 1-2 days, large = 3+ days.
          PROMPT

      - name: Post comment
        if: always()
        shell: bash
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
        run: |
          # The claude output was printed to stdout. We need to capture it.
          # For now, post a simple acknowledgment
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          REPO="${{ github.repository }}"
          curl -sf -H "Authorization: token $GITEA_TOKEN"             -X POST "${{ github.server_url }}/api/v1/repos/$REPO/issues/$ISSUE_NUMBER/comments"             -H "Content-Type: application/json"             -d "{\"body\":\"Breakdown analysis completed. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions) for details.\"}"
